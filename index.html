<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Apócrifa | Plataforma de Estudo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/paginas/home.css">
</head>
<body>

    <div data-component="header"></div>

    <main>
        <!-- HERO -->
        <section class="hero">
            <div class="container hero__content">
                <!-- <h1>Biblioteca Apócrifa</h1> -->
                <p>Uma plataforma digital dedicada ao estudo, preservação e pesquisa de textos antigos, apócrifos e gnósticos.</p>
            </div>
        </section>

       <!-- CARROSSEL: O QUE SÃO LIVROS APÓCRIFOS -->
        <section class="info-carousel">
            <div class="container">
                <div class="info-carousel__card">
                    <h2 id="infoSlideTitulo"></h2>

                    <div class="info-carousel__conteudo" id="infoSlideConteudoWrapper">
                        <div id="infoSlideConteudo"></div>
                    </div>

                    <button class="info-carousel__toggle" id="infoToggle">Ler mais</button>

                    <button class="carousel-arrow carousel-arrow--prev" id="infoPrev" aria-label="Anterior">←</button>
                    <button class="carousel-arrow carousel-arrow--next" id="infoNext" aria-label="Próximo">→</button>
                </div>

                <div class="carousel-dots" id="infoDots"></div>
            </div>
        </section>

        <!-- CTA -->
        <div class="cta-explorar">
            <a href="paginas/biblioteca.html" class="button-primary">Explorar Biblioteca</a>
        </div>

     <!-- LIVROS EM DESTAQUE -->
<section class="featured-books">
    <div class="container">
        <h2>Sequência de Leitura</h2>

        <div class="books-carousel">

            <div class="books-viewport">
                <div class="books-track" id="booksTrack"></div>
            </div>

            <button class="carousel-arrow carousel-arrow--prev" id="booksPrev" aria-label="Livro anterior">←</button>
            <button class="carousel-arrow carousel-arrow--next" id="booksNext" aria-label="Próximo livro">→</button>

        </div>

        <div class="carousel-dots" id="booksDots"></div>
    </div>
</section>

        <!-- NOTA DO EDITOR
        <section class="editor-note">
            <div class="container">
                <h2>Nota do Editor</h2>
                <p>Este site possui fins puramente históricos, literários e académicos. O objetivo é preservar e disponibilizar o acesso à literatura antiga.</p>
            </div>
        </section> -->

    </main>

    <div data-component="footer"></div>
    <div data-component="tabbar"></div>

<script src="assets/js/config/app.config.js"></script>
<script src="assets/js/config/data.config.js"></script>

<script src="assets/js/utils/dom.js"></script>
<script src="assets/js/utils/helpers.js"></script>
<script src="assets/js/utils/format.js"></script>

<script src="assets/js/repositories/livrosRepository.js"></script>
<script src="assets/js/repositories/institucionalRepository.js"></script>

<script src="assets/js/services/livrosService.js"></script>

<script src="assets/js/components/slider.js"></script>
<script src="assets/js/components/cardLivro.js"></script>
<script src="assets/js/components/infoCarousel.js"></script>
<script src="assets/js/components/bookCarousel.js"></script>

<script src="assets/js/layouts/componentes.js"></script>
<script src="assets/js/layouts/navigation.js"></script>

<script src="assets/js/controllers/homeController.js"></script>
<script src="assets/js/pages/home.js"></script>

</body>
</html>
