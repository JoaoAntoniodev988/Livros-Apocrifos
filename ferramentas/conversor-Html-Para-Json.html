<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Livros: HTML para JSON Semântico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 20px;
        }
        header {
            max-width: 1600px;
            margin: 0 auto 20px auto;
            text-align: center;
            padding: 10px 0;
        }
        header h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 8px; }
        header p { color: #94a3b8; font-size: 0.95rem; }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1200px) {
            .container { grid-template-columns: 1fr; }
        }
        
        .painel {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .painel h2 {
            font-size: 1rem;
            color: #f8fafc;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
        input, textarea, select {
            width: 100%;
            background-color: #0f172a;
            color: #f1f5f9;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        input:focus, textarea:focus { outline: none; border-color: #38bdf8; }
        
        textarea { font-family: 'Fira Code', monospace; font-size: 0.8rem; height: 500px; resize: vertical; }
        
        .acoes { grid-column: 1 / -1; text-align: center; margin-top: 10px; }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 14px 50px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.4);
        }
        button:hover { background-color: #0369a1; transform: translateY(-1px); }
        
        .btn-copiar { background: #d97706; padding: 4px 10px; font-size: 0.75rem; color: #fff; box-shadow: none; border-radius: 4px; }
        .btn-copiar:hover { background: #b45309; transform: none; }
    </style>
</head>
<body>

    <header>
        <h1>Conversor Estrutural de Livros Antigos</h1>
        <p>Extração semântica e padronização de textos sagrados, manuscritos e comentários exegéticos.</p>
    </header>

    <div class="container">
        <!-- FORMULÁRIO DE METADADOS DO LIVRO -->
        <div class="painel">
            <h2>Metadados do Livro</h2>
            
            <label for="metaId">ID único (Slug)</label>
            <input type="text" id="metaId" value="apocrifo-joao" placeholder="Ex: apocrifo-joao">
            
            <label for="metaTitulo">Título do Livro</label>
            <input type="text" id="metaTitulo" value="Apócrifo de João" placeholder="Ex: Livro de Tomás">
            
            <label for="metaAutor">Autor / Atribuição</label>
            <input type="text" id="metaAutor" value="Anónimo" placeholder="Ex: Desconhecido">
            
            <label for="metaEpoca">Época Estimada</label>
            <input type="text" id="metaEpoca" value="Século II" placeholder="Ex: Século IV">
            
            <label for="metaColecao">Coleção / Arquivo</label>
            <input type="text" id="metaColecao" value="Nag Hammadi" placeholder="Ex: Manuscritos do Mar Morto">
            
            <label for="metaCategorias">Categorias (Separadas por vírgula)</label>
            <input type="text" id="metaCategorias" value="Gnóstico, Cristianismo Primitivo" placeholder="Ex: Filosofia, Mística">
            
            <label for="metaIdioma">Idioma do Texto</label>
            <input type="text" id="metaIdioma" value="Português" placeholder="Ex: Português">
            
            <label for="metaImagem">Nome do Ficheiro de Imagem</label>
            <input type="text" id="metaImagem" value="apocrifo-joao.webp">
            
            <label for="metaDescricao">Breve Descrição / Sinopse</label>
            <textarea id="metaDescricao" style="height: 100px;" placeholder="Resumo da obra...">Reconstrução interpretativa e análise exegética da revelação secreta de Jesus a João após a crucificação.</textarea>
        </div>

        <!-- INPUT HTML -->
        <div class="painel">
            <h2>Ficheiro HTML do Livro</h2>
            <textarea id="inputHtml" placeholder="Cole aqui o HTML completo contendo as tags <section> ou <article>..."></textarea>
        </div>

        <!-- OUTPUT JSON -->
        <div class="painel">
            <h2>
                JSON Semântico Final
                <button class="btn-copiar" id="btnCopiar" onclick="copiarJson()">Copiar JSON</button>
            </h2>
            <textarea id="outputJson" readonly placeholder="O livro estruturado aparecerá aqui..."></textarea>
        </div>

        <!-- BOTÃO COMPILADOR -->
        <div class="acoes">
            <button onclick="compilarLivroCompleto()">Compilar e Estruturar Livro ⚡</button>
        </div>
    </div>

    <script>
        /**
         * Orquestrador Principal do Aplicativo
         * Captura inputs, força o parse seguro do HTML e injeta os capítulos mapeados
         */
        function compilarLivroCompleto() {
            const htmlBruto = document.getElementById('inputHtml').value;
            if (!htmlBruto.trim()) {
                alert('Por favor, introduza o HTML do livro.');
                return;
            }

            // 1. Criação da raiz do objeto com metadados estruturados
            const livroJson = {
                id: document.getElementById('metaId').value.trim(),
                slug: document.getElementById('metaId').value.trim().toLowerCase(),
                titulo: document.getElementById('metaTitulo').value.trim(),
                autor: document.getElementById('metaAutor').value.trim(),
                epoca: document.getElementById('metaEpoca').value.trim(),
                colecao: document.getElementById('metaColecao').value.trim(),
                idioma: document.getElementById('metaIdioma').value.trim(),
                imagem: document.getElementById('metaImagem').value.trim(),
                descricao: document.getElementById('metaDescricao').value.trim(),
                categorias: document.getElementById('metaCategorias').value.split(',').map(c => c.trim()).filter(Boolean),
                capitulos: []
            };

            // 2. Parse Seguro do DOM (Trata fragmentos incompletos ou malformados)
            const raizDocumento = normalizarHtmlParaDom(htmlBruto);

            // 3. Seleção focada das Seções/Capítulos (Ignora a sujeira estrutural externa)
            const elementosCapitulo = raizDocumento.querySelectorAll('section, [class*="capitulo"], [class*="parte"]');
            
            if (elementosCapitulo.length === 0) {
                // Fallback inteligente: se não houver seções prontas, analisa o corpo todo como capítulo único
                const capituloUnico = extrairDadosDoCapitulo(raizDocumento, "geral", 1);
                livroJson.capitulos.push(capituloUnico);
            } else {
                // Mapeia recursivamente cada capítulo identificado
                elementosCapitulo.forEach((elemento, index) => {
                    const idCapitulo = elemento.id || `capitulo-${index + 1}`;
                    const capituloProcessado = extrairDadosDoCapitulo(elemento, idCapitulo, index + 1);
                    livroJson.capitulos.push(capituloProcessado);
                });
            }

            // 4. Renderização do resultado limpo
            document.getElementById('outputJson').value = JSON.stringify(livroJson, null, 2);
        }

        /**
         * Correção de Erro de Escopo: Garante que o HTML incompleto seja lido 
         * montando um fragmento de documento isolado.
         */
        function normalizarHtmlParaDom(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            // Se o HTML veio sem estruturas básicas (apenas pedaços soltos), o body resolve
            return doc.body || doc.documentElement;
        }

        /**
         * Extrator Semântico do Capítulo
         * Varre o interior de uma <section> para preencher estritamente: titulo, conteudo e exegese
         */
        function extrairDadosDoCapitulo(elementoCapitulo, idCapitulo, index) {
            const capitulo = {
                id: idCapitulo,
                ordem: index,
                titulo: "",
                conteudo: [],
                exegese: []
            };

            // Capturar e higienizar Títulos internos (h1 ou h2 primários)
            const header = elementoCapitulo.querySelector('h1, h2, h3');
            if (header) {
                capitulo.titulo = limparTexto(header.innerText);
            } else {
                capitulo.titulo = `Parte ${index}`;
            }

            // Seleciona os blocos de texto sagrado/narrativa principal
            const blocosTextoSagrado = elementoCapitulo.querySelectorAll('.texto-sagrado, [class*="narrativa"], [class*="texto"]');
            blocosTextoSagrado.forEach(bloco => {
                // Captura parágrafos, blockquotes e listas preservando marcações ricas (strong, em, br)
                const tagsInternas = bloco.querySelectorAll('p, blockquote, li');
                tagsInternas.forEach(tag => {
                    const htmlFiltrado = limparHtmlInterno(tag.innerHTML);
                    if (htmlFiltrado) capitulo.conteudo.push(htmlFiltrado);
                });
            });

            // Seleciona os blocos de comentários, notas analíticas ou exegeses
            const blocosExegese = elementoCapitulo.querySelectorAll('aside, .exegese, [class*="comentario"], [class*="nota"]');
            blocosExegese.forEach(bloco => {
                const tagsInternas = bloco.querySelectorAll('p, li');
                tagsInternas.forEach(tag => {
                    const htmlFiltrado = limparHtmlInterno(tag.innerHTML);
                    // Ignora títulos repetidos da exegese dentro do nó de análise
                    if (htmlFiltrado && !tag.previousElementSibling && tag.tagName.startsWith('H')) return;
                    if (htmlFiltrado) capitulo.exegese.push(htmlFiltrado);
                });
            });

            // Fallback: Se o HTML inserido não usa classes específicas, distribui as tags automaticamente
            if (capitulo.conteudo.length === 0 && capitulo.exegese.length === 0) {
                distribuirTagsPorAmostragem(elementoCapitulo, capitulo);
            }

            return capitulo;
        }

        /**
         * Tratamento de Nós de Texto e Preservação de innerHTML
         * Limpa quebras de linhas desnecessárias do HTML mas mantém formatações de leitura inline
         */
        function limparHtmlInterno(innerHTML) {
            if (!innerHTML) return null;
            // Remove espaços redundantes comuns em minificações de HTML
            let limpo = innerHTML.replace(/\s+/g, ' ').trim();
            return limpo !== "" ? limpo : null;
        }

        function limparTexto(texto) {
            return texto.replace(/\s+/g, ' ').trim();
        }

        /**
         * Fallback Universal Inteligente
         * Caso o HTML colado não possua classes como .texto-sagrado ou .exegese,
         * o parser separa automaticamente o que é conteúdo de leitura e o que é metadado.
         */
        function distribuirTagsPorAmostragem(elementoRaiz, objetoCapitulo) {
            const todosOsP = elementoRaiz.querySelectorAll('p, blockquote');
            todosOsP.forEach(p => {
                const htmlLimpo = limparHtmlInterno(p.innerHTML);
                if (!htmlLimpo) return;

                // Critério semântico padrão: vai para conteúdo do livro. 
                // Se estiver dentro de uma tag secundária (como aside), vai para exegese.
                if (p.closest('aside')) {
                    objetoCapitulo.exegese.push(htmlLimpo);
                } else {
                    objetoCapitulo.conteudo.push(htmlLimpo);
                }
            });
        }

        function copiarJson() {
            const output = document.getElementById('outputJson');
            if (!output.value) return;
            output.select();
            navigator.clipboard.writeText(output.value);
            
            const btn = document.getElementById('btnCopiar');
            btn.innerText = "Copiado! ✓";
            setTimeout(() => { btn.innerText = "Copiar JSON"; }, 2000);
        }
    </script>
</body>
</html>
