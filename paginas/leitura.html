<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Leitura | Biblioteca Apócrifa</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CSS Global -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- CSS da Página -->
    <link rel="stylesheet" href="../assets/css/paginas/leitura.css">
</head>


<body>

   <div data-component="header"></div>
   
    <!-- Barra de Progresso de Leitura -->
    <div class="reading-progress" id="readingProgress" hidden>
        <div class="reading-progress__bar" id="readingProgressBar"></div>
    </div>
<main>

    <!-- Cabeçalho do Livro -->
    <section class="reading-header">
        <div class="container">
            <div class="reading-header__content">
                <h1 id="bookTitle"></h1>
                <p id="bookDescription"></p>
            </div>
        </div>
    </section>

    <!-- Ficha Técnica (colapsável, aparece primeiro) -->
    <details class="ficha-tecnica" id="fichaTecnicaDetails" open>
        <summary class="ficha-tecnica__titulo">Ficha Técnica</summary>

        <dl id="fichaTecnica" class="ficha-tecnica__grid"></dl>

        <div class="ficha-tecnica__acao">
            <button id="btnComecarLeitura" class="button-primary">
                Começar a ler
            </button>
        </div>
    </details>

        <!-- Layout de Leitura: conteúdo + índice lateral -->
    <div class="reading-layout">

        <!-- Área de Leitura -->
        <section class="reading-area" id="readingArea" hidden>
            <div class="reading-container">
                <article class="reading-content">
                    <header class="reading-content__header">
                        <h2 id="chapterTitle"></h2>
                    </header>

                    <div class="reading-text" id="readingText"></div>
                    <div class="exegesis" id="exegesis"></div>
                </article>
            </div>
        </section>

        <!-- Botão para abrir/fechar índice (só visível em mobile) -->
        <button class="reading-toc__toggle" id="btnToggleToc" hidden>Índice de Seções
        </button>

        <!-- Índice de Seções (lateral) -->
        <aside class="reading-toc" id="readingToc" hidden>
            <h3 class="reading-toc__titulo">Índice</h3>
            <nav id="tocLista" class="reading-toc__lista"></nav>
        </aside>

    </div>

    <!-- Navegação -->
    <section class="reading-navigation" id="readingNavigation" hidden>
        <div class="container">
            <button class="button-secondary" id="btnAnterior">
                ← Seção anterior
            </button>

            <button class="button-primary" id="btnProxima">
                Próxima seção →
            </button>
        </div>
    </section>

</main>
    <div data-component="footer"></div>

<script src="../assets/js/layouts/componentes.js"></script>
<script src="../assets/js/layouts/navigation.js"></script>
<script src="../assets/js/layouts/menu.js"></script>
<script src="../assets/js/services/livrosService.js"></script>
<script src="../assets/js/services/leituraService.js"></script>
</body>

</html>
