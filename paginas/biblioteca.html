<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca | Biblioteca Apócrifa</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS Global -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- CSS da Página -->
    <link rel="stylesheet" href="../assets/css/paginas/biblioteca.css">
</head>

<body>

     <div data-component="header"></div>

    <main>

        <!-- Hero -->
        <section class="library-hero">
            <div class="container">
                <div class="library-hero__content">
                    <h1>Biblioteca</h1>
                    <p>
                        Explore textos apócrifos, gnósticos e manuscritos históricos organizados para estudo e pesquisa.
                    </p>
                </div>
            </div>
        </section>

        <!-- Pesquisa -->
        <section class="library-search">
            <div class="container">
                <div class="library-search__content">
                    <form class="search-form">
                        <input
                            type="search"
                            placeholder="Pesquisar um livro..."
                            aria-label="Pesquisar livro">

                        <button
                            type="submit"
                            class="button-primary">
                            Pesquisar
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Filtros -->
        <section class="library-filters">
            <div class="container">
                <div class="library-filters__content">
                    <button class="button-secondary">Todos</button>
                    <button class="button-secondary">Evangelhos</button>
                    <button class="button-secondary">Atos</button>
                    <button class="button-secondary">Cartas</button>
                    <button class="button-secondary">Apocalipses</button>
                    <button class="button-secondary">Manuscritos</button>
                </div>
            </div>
        </section>

        <!-- Resultado -->
        <section class="library-results">
            <div class="container">
                <div class="library-results__content">
                    <p>
                        <strong id="booksCount">0</strong>
                        livros encontrados
                    </p>
                </div>
            </div>
        </section>

        <!-- Livros -->
        <section class="library-books">
            <div class="container">
                <div
                    id="booksContainer"
                    class="books-grid">
                </div>
            </div>
        </section>

    </main>

       <!-- Componente Footer -->
    <div data-component="footer"></div>
    <script src="../assets/js/componentes.js"></script>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/services/livrosService.js"></script>
    <script src="../assets/js/pages/biblioteca.js"></script>
</body>

</html>
